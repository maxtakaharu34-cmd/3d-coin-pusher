<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D コインプッシャー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1020; font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; }
    #app { width: 100%; height: 100%; display: block; }

    #hud {
      position: fixed; top: 16px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 14px;
      pointer-events: none; z-index: 10;
    }
    .card {
      background: rgba(10, 16, 36, 0.72);
      border: 1px solid rgba(255, 215, 120, 0.35);
      border-radius: 14px;
      padding: 10px 18px;
      color: #fff; text-align: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
    }
    .card .label { font-size: 12px; letter-spacing: 1px; color: #ffd778; opacity: 0.9; }
    .card .value { font-size: 28px; font-weight: 700; line-height: 1.1; }

    #help {
      position: fixed; bottom: 16px; left: 0; right: 0;
      text-align: center; color: rgba(255,255,255,0.7);
      font-size: 13px; pointer-events: none; z-index: 10;
    }
    #help b { color: #ffd778; }

    #toast {
      position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
      color: #ffe08a; font-size: 64px; font-weight: 800;
      text-shadow: 0 4px 24px rgba(255,180,40,0.6);
      opacity: 0; pointer-events: none; z-index: 20;
      transition: opacity 0.15s ease;
    }
    .toast-show { animation: pop 0.7s ease forwards; }
    @keyframes pop {
      0% { opacity: 0; transform: translate(-50%, -40%) scale(0.6); }
      30% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
      70% { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
      100% { opacity: 0; transform: translate(-50%, -60%) scale(1.0); }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="app"></canvas>

  <div id="hud">
    <div class="card"><div class="label">残メダル</div><div class="value" id="stock">50</div></div>
    <div class="card"><div class="label">獲得</div><div class="value" id="won">0</div></div>
    <div class="card"><div class="label">盤面</div><div class="value" id="onboard">0</div></div>
  </div>

  <div id="toast"></div>

  <div id="help">
    <b>クリック / スペース</b> でメダル投入　・　<b>マウス左右</b> で投入位置を調整　・　手前中央に落とすと獲得、端は紛失
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
