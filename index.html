<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEON MEDAL PUSHER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #04060f; font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; }
    #app { width: 100%; height: 100%; display: block; }

    #hud {
      position: fixed; top: 18px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 14px;
      pointer-events: none; z-index: 10;
    }
    .card {
      background: rgba(8, 12, 30, 0.55);
      border: 1.5px solid rgba(0, 234, 255, 0.55);
      border-radius: 14px;
      padding: 9px 20px; min-width: 96px;
      color: #fff; text-align: center;
      box-shadow: 0 0 18px rgba(0, 234, 255, 0.35), inset 0 0 12px rgba(0, 234, 255, 0.12);
      backdrop-filter: blur(6px);
    }
    .card.magenta { border-color: rgba(255, 43, 214, 0.6); box-shadow: 0 0 18px rgba(255, 43, 214, 0.35), inset 0 0 12px rgba(255, 43, 214, 0.12); }
    .card.lime { border-color: rgba(57, 255, 136, 0.6); box-shadow: 0 0 18px rgba(57, 255, 136, 0.35), inset 0 0 12px rgba(57, 255, 136, 0.12); }
    .card .label { font-size: 11px; letter-spacing: 2px; color: #9fefff; opacity: 0.95; }
    .card.magenta .label { color: #ffb3f0; }
    .card.lime .label { color: #b3ffd1; }
    .card .value { font-size: 30px; font-weight: 800; line-height: 1.1; text-shadow: 0 0 10px currentColor; }

    #dropBtn {
      position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
      z-index: 10; cursor: pointer; user-select: none;
      padding: 16px 56px; border-radius: 40px;
      font-size: 22px; font-weight: 800; letter-spacing: 4px; color: #04060f;
      background: linear-gradient(180deg, #ffe9a8, #ffc233);
      border: 2px solid #fff2c0;
      box-shadow: 0 0 24px rgba(255, 194, 51, 0.8), 0 6px 18px rgba(0,0,0,0.5);
      transition: transform 0.06s ease, box-shadow 0.15s ease;
    }
    #dropBtn:active { transform: translateX(-50%) scale(0.94); box-shadow: 0 0 12px rgba(255, 194, 51, 0.6); }

    #help {
      position: fixed; bottom: 96px; left: 0; right: 0;
      text-align: center; color: rgba(180, 220, 255, 0.7);
      font-size: 13px; pointer-events: none; z-index: 10;
    }
    #help b { color: #00eaff; }

    #toast {
      position: fixed; top: 38%; left: 50%; transform: translate(-50%, -50%);
      font-size: 68px; font-weight: 900; letter-spacing: 2px;
      opacity: 0; pointer-events: none; z-index: 20;
    }
    .toast-show { animation: pop 0.75s ease forwards; }
    @keyframes pop {
      0% { opacity: 0; transform: translate(-50%, -40%) scale(0.6); }
      28% { opacity: 1; transform: translate(-50%, -50%) scale(1.18); }
      70% { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
      100% { opacity: 0; transform: translate(-50%, -62%) scale(1.0); }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="app"></canvas>

  <div id="hud">
    <div class="card"><div class="label">STOCK</div><div class="value" id="stock">50</div></div>
    <div class="card lime"><div class="label">GET</div><div class="value" id="won">0</div></div>
    <div class="card magenta"><div class="label">BOARD</div><div class="value" id="onboard">0</div></div>
  </div>

  <div id="toast"></div>

  <div id="help"><b>クリック / スペース / ボタン</b> でメダル投入　・　<b>マウス左右</b> で投入位置を調整</div>
  <button id="dropBtn">メダル投入</button>

  <script type="module" src="./game.js"></script>
</body>
</html>
